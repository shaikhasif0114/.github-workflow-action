#Use Trivy Images for cve SCANNING

name: Trivy Image Scanner

on:
    workflow_call:

jobs:
        dependency_scan:
            runs-on: ubuntu-latest

            steps:
                - name: Checkout code
                  uses: actions/checkout@v4

                - name: Docker login
                  uses: docker/login-action@v3
                  with:
                   username: ${{ vars.DOCKERHUB_USER }}
                   password: ${{ secrets.DOCKERHUB }}

                - name: Trivy image scanner
                  uses: aquasecurity/trivy-action@0.35.0
                  with:
                    image-ref: ${{ vars.DOCKERHUB_USER }}/githubactions-app:${{ github.sha }}
                    severity: 'CRITICAL'
                    exit-code: '1'