name: Deploy Portfolio

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # ← fixes Node.js warning

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4              # ✅ keep v4

      - name: Show Run Info
        run: |
          echo "================================================"
          echo "  Portfolio Deploy Started"
          echo "================================================"
          echo "Branch     : ${{ github.ref_name }}"
          echo "Triggered  : ${{ github.actor }}"
          echo "Repo       : ${{ github.repository }}"
          echo "Runner OS  : $RUNNER_OS"
          echo "Date/Time  : $(date)"
          echo "================================================"

      - name: Verify Portfolio File
        run: |
          echo "Checking portfolio files..."
          ls -la .github/workflows/
          if [ -f ".github/workflows/index.html" ]; then
            echo "✅ index.html found!"
            echo "File size: $(du -sh .github/workflows/index.html)"
          else
            echo "❌ index.html NOT found"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4    # ✅ upgraded v3 → v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.github/workflows/
          publish_branch: gh-pages

      - name: Print Portfolio URL
        run: |
          echo "================================================"
          echo "  ✅ DEPLOYMENT SUCCESSFUL!"
          echo "================================================"
          echo ""
          echo "  🌐 Your Portfolio is LIVE at:"
          echo "  https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo ""
          echo "  NOTE: Takes 2-3 minutes to go live"
          echo "================================================"
